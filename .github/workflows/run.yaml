name: Model Training CICD
permissions:
  id-token: write
  contents: write

on:
  - push

jobs:
  run:
    runs-on:
      - ubuntu-latest

    steps:
      - uses: iterative/setup-cml@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v3

      - name: Train model
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install -r requirements.txt
          python train_model.py

          # Build report
          echo "## RF and LR Model Score" > report.md
          cat scores.txt >> report.md

          # Build image report using cml publish
          echo "## Confusion Matrix & Feature Importance" > report1.md
          cml publish ConfusionMatrix.png --md >> report1.md
          cml publish FeatureImportance.png --md >> report1.md

          # Combine and post comment
          cat report.md report1.md > combined_file.md
          cml comment create combined_file.md
